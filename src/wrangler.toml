name = "zudeira-amplifi"
compatibility_date = "2024-03-01"

# Since this is a Vite React application, we'll configure Cloudflare Pages for the frontend
pages_build_output_dir = "dist"

# Environment Variables for the backend (if using Cloudflare Workers for the API layer later)
# [vars]
# GEMINI_API_KEY = "your-api-key"
# GCS_BUCKET_NAME = "your-bucket-name"
# GOOGLE_APPLICATION_CREDENTIALS = "your-gcs-creds"

# Note: For the SQLite database, you should consider migrating to Cloudflare D1
# If you decide to do that, you'd configure it here:
# [[d1_databases]]
# binding = "DB"
# database_name = "zudeira-db"
# database_id = "your-db-id"
